name: Fix asset split file paths

on:
  push:
    branches:
      - asset-split-preview
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-paths:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'Run asset split path fixer')
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: asset-split-preview
          fetch-depth: 0

      - name: Move split files into folders
        run: |
          set -euxo pipefail
          mkdir -p styles planner
          if [ -f wizard.css ]; then
            git mv -f wizard.css styles/wizard.css
          fi
          if [ -f tetromino-planner.html ]; then
            git mv -f tetromino-planner.html planner/tetromino-planner.html
          fi
          if [ -f wizard_asset_split_preview_files.zip ]; then
            git rm -f wizard_asset_split_preview_files.zip
          fi
          git rm -f .github/workflows/fix-asset-split-paths.yml

      - name: Commit folder move
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No path changes needed."
            exit 0
          fi
          git commit -m "Move asset split files into folders"
          git push origin asset-split-preview
